<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RustSynth UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link href="./dist/output.css" rel="stylesheet">
</head>
<body class="min-h-screen bg-ctp-base text-ctp-text font-sans" style="font-family: 'Roboto', sans-serif;">
    <!-- Top toolbar -->
    <div class="bg-ctp-base border-b border-dark-3 p-4">
        <h1 class="font-bold text-xl">RustSynth</h1>
    </div>

    <!-- Main container -->
    <div class="grid grid-cols-2" style="height: calc(100vh - 28px);">
        <!-- Editor panel -->
        <div class="bg-ctp-mantle border-r border-dark-3 p-2.5 text-sm leading-relaxed overflow-auto whitespace-pre font-mono">// camera
set translation [0 -0.36 13 -20]

// rules
rule r0 {
  3 * { rz 120 } R1
}

rule R1 {
  { x 1.3 rz 6 } sphere
}</div>

        <!-- Preview canvas -->
        <div class="bg-black"></div>
    </div>

    <!-- Bottom log -->
    <div class="bg-ctp-mantle border-t border-ctp-surface0 px-2.5 py-1.5 text-xs text-ctp-subtext0">
        ready
    </div>
</body>
</html>
