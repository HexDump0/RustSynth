<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RustSynth UI</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet">
        <link href="./dist/output.css" rel="stylesheet">
    </head>

    <body class="h-screen flex flex-col overflow-hidden bg-ctp-base text-ctp-text font-sans"
        style="font-family: 'Manrope', sans-serif;">
        <!-- Top toolbar -->
        <div class="bg-ctp-crust py-4 px-6 flex justify-between items-center">
            <div class="flex items-end gap-2">
                <h1 class="font-bold text-2xl text-ctp-mauve-300 uppercase">RustSynth</h1>
                <span class="text-xs text-ctp-subtext0 font-mono">v0.1.0 (WEB)</span>
            </div>
            <div class="flex justify-center items-center gap-8">
                <a href="https://github.com/HexDump0/RustSynth" target="_blank"
                    class="flex gap-2 font-bold justify-center items-center"><svg xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" viewBox="0 0 16 16">
                        <path fill="#cdd6f4" fill-rule="evenodd"
                            d="M7.976 0A7.977 7.977 0 0 0 0 7.976c0 3.523 2.3 6.507 5.431 7.584c.392.049.538-.196.538-.392v-1.37c-2.201.49-2.69-1.076-2.69-1.076c-.343-.93-.881-1.175-.881-1.175c-.734-.489.048-.489.048-.489c.783.049 1.224.832 1.224.832c.734 1.223 1.859.88 2.3.685c.048-.538.293-.88.489-1.076c-1.762-.196-3.621-.881-3.621-3.964c0-.88.293-1.566.832-2.153c-.05-.147-.343-.978.098-2.055c0 0 .685-.195 2.201.832c.636-.196 1.322-.245 2.007-.245s1.37.098 2.006.245c1.517-1.027 2.202-.832 2.202-.832c.44 1.077.146 1.908.097 2.104a3.16 3.16 0 0 1 .832 2.153c0 3.083-1.86 3.719-3.62 3.915c.293.244.538.733.538 1.467v2.202c0 .196.146.44.538.392A7.98 7.98 0 0 0 16 7.976C15.951 3.572 12.38 0 7.976 0"
                            clip-rule="evenodd" />
                    </svg>GITHUB</a>
                <a href="https://github.com/HexDump0/RustSynth" target="_blank"
                    class="flex gap-1 font-bold justify-center items-center"><svg xmlns="http://www.w3.org/2000/svg"
                        width="24" height="24" viewBox="0 0 16 16">
                        <path fill="#cdd6f4"
                            d="M3 3a2 2 0 0 1 2-2h3.586a1.5 1.5 0 0 1 1.06.44l2.915 2.914A1.5 1.5 0 0 1 13 5.414V13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2zm2-1a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V6H9.5A1.5 1.5 0 0 1 8 4.5V2zm4.5 3h2.293L9 2.207V4.5a.5.5 0 0 0 .5.5m-4 3a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1zM5 10.5a.5.5 0 0 1 .5-.5h5a.5.5 0 0 1 0 1h-5a.5.5 0 0 1-.5-.5m.5 1.5a.5.5 0 0 0 0 1h5a.5.5 0 0 0 0-1z" />
                    </svg>DOCS</a>
            </div>
        </div>

        <div class="h-12 w-screen bg-ctp-base px-6 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <div class="flex items-center justify-center gap-6">
                    <div
                        class="bg-ctp-crust px-4 py-1 text-sm font-mono text-ctp-subtext-1 tracking-wide uppercase flex justify-between">
                        NEW</span>
                    </div>
                    <div
                        class="bg-ctp-crust px-4 py-1 text-sm font-mono text-ctp-subtext-1 tracking-wide flex justify-between gap-6">
                        OPEN</span>

                    </div>
                </div>
                <div class="h-6 w-px bg-ctp-surface1"></div>
                <div class="flex items-center justify-center gap-6">
                    <div
                        class="bg-ctp-crust px-4 py-1 text-sm font-mono text-ctp-subtext-1 tracking-wide uppercase w-24 flex justify-between">
                        seed <span class="text-ctp-mauve-300">1</span>
                    </div>
                    <div
                        class="bg-ctp-crust px-4 py-1 text-sm font-mono text-ctp-subtext-1 tracking-wide flex justify-between gap-6 min-w-36">
                        EXAMPLES <span class="text-ctp-mauve-300">binary_kite.es</span>

                    </div>
                </div>
            </div>
            <div class="flex items-center justify-center gap-6">
                <div
                    class="bg-ctp-mauve-700 px-4 py-1 text-sm font-mono tracking-wide flex justify-between gap-2 text-black items-center">
                    RUN
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
                        <path fill="#000"
                            d="M3 3.5a1.5 1.5 0 0 1 2.235-1.307l8 4.5a1.5 1.5 0 0 1 0 2.615l-8 4.5A1.5 1.5 0 0 1 3 12.5z" />
                    </svg>
                </div>
                <div
                    class="bg-ctp-crust px-4 py-1 text-sm font-mono text-ctp-subtext-1 tracking-wide flex justify-between gap-2 items-center">
                    EXPORT
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
                        <path fill="#cdd6f4"
                            d="M11.5 7a4.5 4.5 0 1 0 0 9a4.5 4.5 0 0 0 0-9m2.354 4.854l-2 2a.5.5 0 0 1-.35.147h-.006a.5.5 0 0 1-.348-.144l-.003-.003l-2-2a.5.5 0 0 1 .707-.707L11 12.294V9.001a.5.5 0 0 1 1 0v3.293l1.146-1.147a.5.5 0 0 1 .707.707zM4.25 12H6v1H4.25a3.25 3.25 0 0 1-.22-6.493A4 4 0 0 1 8 3a3.99 3.99 0 0 1 3.857 3h-1.046A2.99 2.99 0 0 0 8 4a3 3 0 0 0-3 3a.5.5 0 0 1-.5.5h-.25a2.25 2.25 0 1 0 0 4.5" />
                    </svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 flex-1 min-h-0">
            <div class="flex flex-col h-full">
                <div class="w-full h-8 bg-ctp-mantle flex justify-between items-center px-6">
                    <p class="text-ctp-mauve-400 uppercase text-xs font-semibold">binary_kite.es</p>
                    <p class="text-ctp-overlay1 text-xs">Ln 1, Col 1</p>
                </div>
                <div class="bg-ctp-crust p-2.5 text-sm leading-relaxed overflow-auto whitespace-pre font-mono h-full"
                    style="font-family: 'JetBrains Mono', monospace;">// camera
set translation [0 -0.36 13 -20]

// rules
rule r0 {
3 * { rz 120 } R1
}

rule R1 {
{ x 1.3 rz 6 } sphere
}
                </div>
            </div>

            <div class="bg-black"></div>
        </div>

        <div class="bg-ctp-mantle px-4 py-2 text-xs text-ctp-subtext0">
            ready
        </div>
    </body>

</html>
